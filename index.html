<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Wallpaper Holiday Planner</title>

  <meta http-equiv="Content-Security-Policy"
    content="
      default-src 'self';
      base-uri 'self';
      object-src 'none';
      frame-ancestors 'none';
      script-src 'self' https://cdnjs.cloudflare.com;
      style-src 'self' 'unsafe-inline';
      img-src 'self' https: data:;
      connect-src 'self' https://api.open-meteo.com;
      font-src 'self';
      media-src 'none';
      form-action 'self';
    " />

  <link rel="stylesheet" href="style.css" />
</head>
<body>

<div class="page-shell">

  <header class="site-header">
    <div id="headerBg" class="header-bg"></div>

    <div class="brand-wrap">
      <div class="brand-pill">Discovery Engine</div>
      <h1>Roll the world.</h1>
      <p class="hero-copy">
        One click. One destination. Real links. Real plan.
      </p>
    </div>
  </header>

  <main class="app-grid">

    <section class="control-panel glass-card">
      <form id="tripForm">

        <div class="field-grid">
          <input id="from" placeholder="LHR" />
          <input id="departDate" type="date" />
          <input id="returnDate" type="date" />
          <select id="travellers">
            <option value="1">1</option>
            <option value="2" selected>2</option>
          </select>
          <select id="vibe">
            <option value="all">Any</option>
            <option value="coastal">Coastal</option>
            <option value="city">City</option>
            <option value="nature">Nature</option>
          </select>
          <select id="style">
            <option value="balanced">Balanced</option>
            <option value="adventure">Adventure</option>
            <option value="relaxed">Relaxed</option>
          </select>
        </div>

        <div class="action-row">
          <button id="generateBtn" type="button">🎲 Generate Trip</button>
          <button id="rerollBtn" type="button">Reroll</button>
        </div>

        <p id="formMessage"></p>

      </form>
    </section>

    <section class="result-panel">

      <div id="emptyState" class="empty-state">
        <h2>No trip yet</h2>
      </div>

      <div id="tripCard" class="trip-card is-hidden">

        <div id="tripHero" class="trip-hero">
          <div class="hero-content">
            <h2 id="tripTitle"></h2>
            <p id="tripSubtitle"></p>
          </div>
        </div>

        <div class="trip-body">
          <div id="snapshotGrid"></div>
          <a id="flightLink" target="_blank">Flights</a>
          <a id="hotelLink" target="_blank">Hotels</a>
          <a id="mapsLink" target="_blank">Map</a>
          <div id="itineraryDays"></div>
        </div>

      </div>

    </section>

  </main>

</div>

<script src="data/destinations.js"></script>
<script src="app.js"></script>

</body>
</html>
